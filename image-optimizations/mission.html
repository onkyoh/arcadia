<picture class="cs-picture cs-picture1">
	<!--Mobile Image-->
	<source media="(max-width: 600px)" srcset="{% getUrl "/assets/images/arcadia14.jpg" | resize({ width: 576, height: 640 }) | webp %}" type="image/webp">
	<!--Tablet Image-->
	<source media="(max-width: 1024px)" srcset="{% getUrl "/assets/images/arcadia14.jpg" | resize({ width: 594, height: 1228 }) | webp %}" type="image/webp">
	<!--Desktop Image-->
	<source media="(min-width: 1024px)" srcset="{% getUrl "/assets/images/arcadia14.jpg" | resize({ width: 1174, height: 1360 }) | webp %}" type="image/webp">
	<img src="{% getUrl "/assets/images/arcadia14.jpg" | resize({ width: 1174, height: 1360 }) | jpeg %}" alt="Completed Arcadia micro-structure installed in a residential backyard" width="587" height="680" fetchpriority="high" decoding="async">
</picture>
