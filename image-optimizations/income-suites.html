<link rel="preload" as="image" href="{% getUrl "/assets/images/income1.jpg" | resize({ width: 576, height: 640 }) | webp %}" />
<!--  -->

<picture class="cs-picture">
	<!--Mobile Image-->
	<source media="(max-width: 600px)" srcset="{% getUrl "/assets/images/income1.jpg" | resize({ width: 576, height: 640 }) | webp %}" type="image/webp">
	<!--Tablet Image-->
	<source media="(max-width: 1024px)" srcset="{% getUrl "/assets/images/income1.jpg" | resize({ width: 1230, height: 1228 }) | webp %}" type="image/webp">
	<!--Desktop Image-->
	<source media="(min-width: 1024px)" srcset="{% getUrl "/assets/images/income1.jpg" | resize({ width: 2386, height: 1360 }) | webp %}" type="image/webp">
	<img src="{% getUrl "/assets/images/income1.jpg" | resize({ width: 2386, height: 1360 }) | jpeg %}" alt="Arcadia income suite on a residential property" width="1193" height="680" fetchpriority="high" decoding="async">
</picture>
